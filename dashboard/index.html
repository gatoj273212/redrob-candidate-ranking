<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Ranking Dashboard — Redrob AI</title>
    <meta name="description" content="Ranked shortlist of 100 candidates for Senior AI Engineer (Founding Team). Upload submission.csv or load the generated results.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header__inner">
            <div class="header__brand">
                <div class="header__logo">R</div>
                <div>
                    <h1 class="header__title">Candidate Ranking</h1>
                    <p class="header__subtitle">Senior AI Engineer — Founding Team</p>
                </div>
            </div>
            <div class="header__stats" id="header-stats">
                <div class="stat-chip">
                    <span class="stat-chip__value" id="stat-total">—</span>
                    <span class="stat-chip__label">ranked</span>
                </div>
                <div class="stat-chip stat-chip--accent">
                    <span class="stat-chip__value" id="stat-avg-score">—</span>
                    <span class="stat-chip__label">avg score</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-chip__value" id="stat-ml-titles">—</span>
                    <span class="stat-chip__label">AI/ML titles</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Controls Bar -->
    <section class="controls" id="controls">
        <div class="controls__inner">
            <div class="search-box" id="search-box">
                <input type="text" class="search-box__input" id="search-input" placeholder="Search candidates, skills, companies..." autocomplete="off">
            </div>
            <div class="filter-group">
                <select class="filter-select" id="filter-title">
                    <option value="">All Titles</option>
                    <option value="ai">AI / ML Engineer</option>
                    <option value="data">Data Scientist</option>
                    <option value="nlp">NLP Engineer</option>
                    <option value="other">Other</option>
                </select>
                <select class="filter-select" id="filter-location">
                    <option value="">All Locations</option>
                    <option value="india">India</option>
                    <option value="pune">Pune</option>
                    <option value="noida">Noida</option>
                    <option value="bangalore">Bangalore</option>
                    <option value="international">International</option>
                </select>
                <select class="filter-select" id="filter-experience">
                    <option value="">All Experience</option>
                    <option value="5-9">5–9 years (ideal)</option>
                    <option value="3-5">3–5 years</option>
                    <option value="9+">9+ years</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main" id="main">
        <!-- Score Distribution Chart -->
        <section class="chart-section" id="chart-section">
            <h3 class="section-label">Score Distribution</h3>
            <div class="chart-container">
                <canvas id="score-chart" width="800" height="200"></canvas>
            </div>
        </section>

        <!-- Candidate List -->
        <section class="candidates-grid" id="candidates-grid">
            <div class="loading-state" id="loading-state">
                <p>Loading candidate data...</p>
            </div>
        </section>
    </main>

    <!-- Upload Overlay -->
    <div class="upload-overlay" id="upload-overlay">
        <div class="upload-card">
            <h2 class="upload-card__title">Load Ranking Data</h2>
            <p class="upload-card__desc">Upload your submission.csv to visualize ranked candidates</p>
            <div class="upload-card__dropzone" id="dropzone">
                <p>Drop CSV here or <label for="file-input" class="upload-link">browse files</label></p>
                <input type="file" id="file-input" accept=".csv" hidden>
            </div>
            <button class="btn btn--primary" id="load-sample-btn">Load Sample Data</button>
        </div>
    </div>

    <!-- Candidate Detail Modal -->
    <div class="modal-overlay" id="modal-overlay" hidden>
        <div class="modal" id="candidate-modal" role="dialog" aria-modal="true">
            <button class="modal__close" id="modal-close" aria-label="Close">&times;</button>
            <div class="modal__content" id="modal-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
