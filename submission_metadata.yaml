# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini (Antigravity IDE)"

ai_usage_summary: |
  Used Gemini via Antigravity IDE for architecture discussion, code generation,
  and debugging. No candidate data was fed to any external LLM API during ranking.
  All scoring and ranking runs entirely offline on CPU with no network access.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid multi-signal ranker combining semantic and structural analysis.

  Phase 1 (Pre-computation): TF-IDF vectorization (30K features, unigrams+bigrams)
  followed by TruncatedSVD (384 dimensions) for latent semantic embeddings of all
  100K candidates. Runs in ~2 minutes on CPU.

  Phase 2 (Ranking, <5 min): Three-tier scoring:
  1) Semantic (40%): Cosine similarity between JD and candidate SVD embeddings
  2) Structural (40%): Rule-based scoring of title fit, experience band (6-8yr
     ideal), skill match (duration-weighted), career evidence (production keywords),
     location, and education
  3) Behavioral (20%): Redrob platform signals — recency, response rate,
     open-to-work, notice period, GitHub activity, profile completeness

  Honeypot detection penalizes impossible profiles. Disqualifier penalties for
  consulting-only careers, pure research, and non-technical backgrounds.
  Runtime: ~5 seconds for ranking phase.

